{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <h1 class="mb-4">
                Contact Us
            </h1>

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Name
                    </label>

                    {{ form.name }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    {{ form.email }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Subject
                    </label>

                    {{ form.subject }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Message
                    </label>

                    {{ form.message }}

                </div>

                <button type="submit"
                        class="btn btn-primary">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
