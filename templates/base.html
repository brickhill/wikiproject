<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Site{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<header>
    <h1>My Website</h1>
    {% if user.is_authenticated %}
        <p>Signed in as: {{ user.username }}</p>
    {% endif %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">MySite</a>
            <div>
                <a class="nav-link d-inline text-white" href="{% url 'home' %}">Home</a>
                <a class="nav-link d-inline text-white" href="{% url 'about' %}">About</a>
                {% if user.is_authenticated %}
                    <a class="nav-link d-inline text-white" href="{% url 'member' %}">Member</a>

                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link p-0 m-0 align-baseline">
                         Logout
                        </button>
                    </form>
                {% else %}
                    <a class="nav-link d-inline text-white" href="{% url 'login' %}">Login</a>
                    <a class="nav-link d-inline text-white" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
<   /nav>
</header>


<hr>

{% block content %}
<!-- Default content (optional) -->
{% endblock %}

<hr>

<footer class="container-fluid">
    <p>© 2026 My Site</p>
</footer>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
