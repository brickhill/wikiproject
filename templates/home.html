{% extends "base.html" %}
{% block title %}
{{ title }}
{% endblock %}
{% block content %}
<div class="text-center mt-5">
    <h1 class="display-4">Welcome</h1>
    <p class="lead">This is styled with Bootstrap</p>

</div>
<div class="container-fluid">
    <h1>{{ title|safe }}</h1>
    {{ content|safe }}
    {% if image %}
    <img src="{{ image.url }}"
         alt="{{ image.title }}">
{% endif %}
</div>
{% endblock %}
