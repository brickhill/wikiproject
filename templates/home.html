{% extends "base.html" %}
{% block title %}
{{ title }}
{% endblock %}
{% block content %}
<div class="text-center mt-5">
    <h1 class="display-4">{{ hero_title }}</h1>
    {{ hero_content|safe }}

</div>
<div class="container-fluid">
    <h1>{{ title|safe }}</h1>
    {{ content|safe }}
    {% if image %}
    <img src="{{ image.url }}"
         alt="{{ image_title }}">
{% endif %}
</div>
{% endblock %}
