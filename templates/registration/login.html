{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container-fluid">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <!-- <button type="submit">Login</button> -->
        <button type="submit" class="btn btn-primary btn-sm shadow">
            Logon
        </button>  
    </form>

    <a href="{% url 'password_reset' %}">Forgot password?</a>
</div>
{% endblock %}
