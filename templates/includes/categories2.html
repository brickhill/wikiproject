<!-- templates/includes/categories2.html -->
<ul class="list-group-unnumbered list-group-flush">
    {% for c in categories %}
        <li class="list-group-item">
            <a href="{% url 'category_detail' id=c.id %}">
                {{ c.name }}
            </a>
            {% if c.children.exists %}
                {% include "includes/categories2.html" with categories=c.children.all %}
            {% endif %}
        </li>
    {% endfor %}
</ul>
