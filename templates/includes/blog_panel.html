<!-- templates/includes/blog_panel.html -->
<div class="card mb-3">
    {% if series %}
        <div class="card-header">{{ series }}</div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
                <p>{{ post }}</p>
            </li>
        </ul>
    {% else %}
        <div class="card-header">BLOG POST</div>
    {% endif %}
</div>
