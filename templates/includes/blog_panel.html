<!-- templates/includes/blog_panel.html -->
<div class="card mb-3">
    {% if series %}
        <div class="card-header">{{ series }}</div>
        <ol class="list-group-numbered list-group-flush">
            {% for p in posts %}
                <li class="list-group-item">
                    {% if p.post.slug == post.slug %}
                        <b>
                    {% endif %}
                    <a href="{% url 'post_detail2' slug=p.post.slug series=series.slug %}">
                        {{ p.post.title }}
                    </a>
                    {% if p.post.slug == post.slug %}
                        </b>
                    {% endif %}
                </li>
            {% endfor %}
        </ol>
    {% else %}
        <div class="card-header">BLOG POST</div>
        <p>Maybe put most recent posts?</p>
    {% endif %}
</div>
