<div class="card mb-3 ms-{{ level|default:0 }}">
    <div class="card-body">

        <strong>{{ comment.user.username }}</strong>
        <small class="text-muted">
            {{ comment.created }}
        </small>

        <p class="mt-2">
            {{ comment.content }}
        </p>

        {% if user.is_authenticated %}
        <button class="btn btn-sm btn-outline-secondary"
                onclick="showReplyForm('{{ comment.id }}')">
            Reply
        </button>

        <form method="post"
              id="reply-form-{{ comment.id }}"
              style="display:none;"
              class="mt-3">

            {% csrf_token %}

            {{ form.as_p }}

            <input type="hidden"
                   name="parent_id"
                   value="{{ comment.id }}">

            <button type="submit"
                    class="btn btn-primary btn-sm">
                Reply
            </button>

        </form>
        {% endif %}

        {% for reply in comment.replies.all %}
            {% include "blog/comment.html" with comment=reply level=level|add:1 %}
        {% endfor %}

    </div>
</div>
