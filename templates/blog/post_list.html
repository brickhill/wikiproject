{% extends "base.html" %}

{% block content %}

<div class="container-fluid">


<h1>Blog</h1>

{% for post in posts %}
  <h2><a href="{% url 'post_detail' post.slug %}">{{ post.title }}</a></h2>
  <p>{{ post.excerpt }}</p>
{% endfor %}

<form method="get" action="{% url 'search' %}">
    <input type="text" name="q" placeholder="Search...">
    <button type="submit" class="btn btn-primary btn-lg px-4 py-2 shadow">Search</button>

</form>
</div>
{% endblock %}
