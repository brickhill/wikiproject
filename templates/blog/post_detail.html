{% extends "base.html" %}

{% block content %}

<div class="container-fluid">


<h1>{{ post.title }}</h1>
<p>{{ post.content|safe }}</p>
<p>{{ post.categories }}</p>

<form method="get" action="{% url 'search' %}">
    <input type="text" name="q" placeholder="Search..."> 
    <button type="submit" class="btn btn-primary btn-lg px-4 py-2 shadow">Search</button>

</form>
</div>
{% endblock %}
